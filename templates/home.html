<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <header style="text-align:center; color:white; margin-bottom:25px;">

<h2> Smart Lender</h2>

<p>Machine Learning Based Loan Approval Prediction System</p>

</header>

    <div class="card">

        <h1>🏦 Loan Approval Prediction</h1>

        <p>
            Enter the applicant details below to predict whether the loan
            will be Approved or Rejected.
        </p>

        <form action="/predict" method="POST">

            <label>Gender</label>
            <select name="Gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Married</label>
            <select name="Married" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Dependents</label>
            <select name="Dependents" required>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3+">3+</option>
            </select>

            <label>Education</label>
            <select name="Education" required>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
            </select>

            <label>Self Employed</label>
            <select name="Self_Employed" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Applicant Income</label>
            <input
                type="number"
                name="ApplicantIncome"
                placeholder="Enter Applicant Income"
                required>

            <label>Coapplicant Income</label>
            <input
                type="number"
                name="CoapplicantIncome"
                placeholder="Enter Coapplicant Income"
                required>

            <label>Loan Amount</label>
            <input
                type="number"
                name="LoanAmount"
                placeholder="Loan Amount"
                required>

            <label>Loan Amount Term</label>
            <input
                type="number"
                name="Loan_Amount_Term"
                placeholder="Loan Term"
                required>

            <label>Credit History</label>
            <select name="Credit_History" required>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>

            <label>Property Area</label>
            <select name="Property_Area" required>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
            </select>

            <button type="submit">
                🔍 Predict Loan Approval
            </button>

        </form>

    </div>

</div>

</body>

</html>
